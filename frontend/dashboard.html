<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — TeamTask</title>
  <meta name="description" content="Your project and task overview dashboard." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <script>
    const saved = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', saved);
  </script>
</head>
<body>

<div class="app-layout">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <h2>🗂️ TeamTask</h2>
      <p id="sidebar-username">Loading...</p>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="active" id="nav-dashboard">
        <span class="nav-icon">📊</span> Dashboard
      </a>
      <a href="projects.html" id="nav-projects">
        <span class="nav-icon">📁</span> Projects
      </a>
      <a href="tasks.html" id="nav-tasks">
        <span class="nav-icon">✅</span> My Tasks
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="theme-toggle w-100" id="theme-btn">🌙 Dark</button>
      <button class="btn btn-outline w-100 mt-1" id="logout-btn" style="margin-top: 0.5rem;">
        🚪 Logout
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <div class="topbar">
      <div>
        <h1>Dashboard</h1>
        <p class="text-secondary" id="welcome-msg">Welcome back!</p>
      </div>
      <div class="topbar-actions">
        <span id="role-badge" class="badge"></span>
      </div>
    </div>

    <!-- Stats Cards -->
    <div class="stats-grid" id="stats-grid">
      <div class="stat-card stat-total">
        <div class="stat-icon">📋</div>
        <div class="stat-number" id="stat-total">—</div>
        <div class="stat-label">Total Tasks</div>
      </div>
      <div class="stat-card stat-completed">
        <div class="stat-icon">✅</div>
        <div class="stat-number" id="stat-completed">—</div>
        <div class="stat-label">Completed</div>
      </div>
      <div class="stat-card stat-progress">
        <div class="stat-icon">⚙️</div>
        <div class="stat-number" id="stat-progress">—</div>
        <div class="stat-label">In Progress</div>
      </div>
      <div class="stat-card stat-overdue">
        <div class="stat-icon">🔴</div>
        <div class="stat-number" id="stat-overdue">—</div>
        <div class="stat-label">Overdue</div>
      </div>
      <div class="stat-card stat-mine">
        <div class="stat-icon">👤</div>
        <div class="stat-number" id="stat-mine">—</div>
        <div class="stat-label">Assigned to Me</div>
      </div>
    </div>

    <!-- Recent Tasks -->
    <div class="card mb-3">
      <div class="card-header">
        <h2>My Tasks</h2>
        <a href="tasks.html" class="btn btn-outline btn-sm">View All →</a>
      </div>
      <div class="card-body" id="recent-tasks">
        <div class="empty-state">
          <div class="empty-icon">⏳</div>
          <p>Loading tasks...</p>
        </div>
      </div>
    </div>

    <!-- Projects -->
    <div class="card">
      <div class="card-header">
        <h2>My Projects</h2>
        <a href="projects.html" class="btn btn-outline btn-sm">View All →</a>
      </div>
      <div class="card-body" id="recent-projects">
        <div class="empty-state">
          <div class="empty-icon">⏳</div>
          <p>Loading projects...</p>
        </div>
      </div>
    </div>
  </main>
</div>

<div id="toast"></div>
<script type="module" src="js/dashboard.js"></script>
</body>
</html>
